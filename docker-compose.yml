# Local development compose — CPU-only by default.
# Usage:
#   cp .env.example .env  &&  docker compose up --build
#
# For GPU, run with:  docker compose --profile cuda up
#
# ------------------------------------------------------------ base service
services:
  stt:
    build:
      context: .
      dockerfile: Dockerfile
    image: stt-endpoint:local
    container_name: stt-endpoint
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STT_DEVICE: ${STT_DEVICE:-cpu}
      STT_COMPUTE_TYPE: ${STT_COMPUTE_TYPE:-int8}
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

# ------------------------------------------------------------ GPU profile
  stt-cuda:
    profiles: ["cuda"]
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: stt-endpoint:cuda
    container_name: stt-endpoint-cuda
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STT_DEVICE: cuda
      STT_COMPUTE_TYPE: float16
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8001:8000"
    volumes:
      - ./models:/app/models
