# Nginx config for the STT frontend.
#
# Architecture:
#   /            -> static files from /usr/share/nginx/html (SPA fallback)
#   /api/*       -> proxied to auth-service:4000
#   /auth/*      -> proxied to auth-service:4000
#   /csrf-mint   -> proxied to auth-service:4000
#   /docs        -> proxied to auth-service:4000 (Swagger UI)
#   /openapi.json -> proxied to auth-service:4000
#   /health      -> proxied to auth-service:4000
#
# When the browser talks to nginx (same origin), it doesn't need CORS or the
# CSRF double-submit dance is preserved because cookies are still same-origin.

upstream auth_service {
    server auth-service:4000;
    keepalive 32;
}

# General security headers — the auth-service adds its own via helmet.
server {
    listen 80;
    server_name _;

    # Security headers (belt + suspenders alongside Helmet in auth-service).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Sensible gzip for static assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed/static assets get long cache, HTML is always fresh.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location /favicon.svg {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Auth + API + docs passthroughs. /api comes first so it matches before
    # the SPA fallback.
    location ~ ^/(api|auth|csrf-mint|docs|openapi.json|health|ready) {
        proxy_pass http://auth_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Audio uploads can be 25 MB+ — let buffering wait for body.
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback: anything else gets index.html so React Router handles it.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }
}
